# Paleta — shattered_glass
# Derivada del estudio en docs/studies/shattered_glass.md
# Rostro de vidrio/espejo fragmentado, sunburst radial, fondo cálido.
#
# Ejes dominantes: marrón cálido (fondo) vs gris plata (vidrio).
# Rango dinámico bimodal: negros puros en grietas, blancos puros en especulares.

name: shattered_glass
hue_axis:
  warm_deg: 25       # fondo marrón/ámbar
  cool_deg: 210      # vidrio gris frío
notes: |
  Saturación global muy baja — el drama viene del contraste de temperatura
  y del rango dinámico extendido (0.02 → 0.99).
  El fondo cálido debe mantenerse casi fijo; solo el vidrio reacciona al audio.

tokens:

  bg_wood_dark:
    role: "Sombra más profunda del fondo"
    hex: "#1C0F08"
    rgb01: [0.110, 0.059, 0.031]
    rgb255: [28, 15, 8]

  bg_wood_mid:
    role: "Fondo desenfocado dominante"
    hex: "#3A200F"
    rgb01: [0.227, 0.125, 0.059]
    rgb255: [58, 32, 15]

  bg_wood_warm:
    role: "Destellos cálidos del fondo, bounce indirecto"
    hex: "#6B3E1C"
    rgb01: [0.420, 0.243, 0.110]
    rgb255: [107, 62, 28]

  bg_wood_amber:
    role: "Punto más claro del fondo, ámbar quemado"
    hex: "#8C5424"
    rgb01: [0.549, 0.329, 0.141]
    rgb255: [140, 84, 36]

  crack_black:
    role: "Hairlines entre esquirlas — casi negro puro"
    hex: "#080604"
    rgb01: [0.031, 0.024, 0.016]
    rgb255: [8, 6, 4]

  shard_shadow:
    role: "Interior de las esquirlas en sombra"
    hex: "#2E323A"
    rgb01: [0.180, 0.196, 0.227]
    rgb255: [46, 50, 58]

  shard_body:
    role: "Gris plata, masa media del vidrio"
    hex: "#8C929A"
    rgb01: [0.549, 0.573, 0.604]
    rgb255: [140, 146, 154]

  shard_cool:
    role: "Gris frío, caras orientadas a la luz cielo"
    hex: "#B4BDC4"
    rgb01: [0.706, 0.741, 0.769]
    rgb255: [180, 189, 196]

  shard_highlight:
    role: "Borde/cara iluminada frontal"
    hex: "#E8ECEF"
    rgb01: [0.910, 0.925, 0.937]
    rgb255: [232, 236, 239]

  spec_white:
    role: "Catchlights puntuales, cuasi-blanco"
    hex: "#FBFCFD"
    rgb01: [0.984, 0.988, 0.992]
    rgb255: [251, 252, 253]

  refl_warm:
    role: "Bounce cálido del fondo sobre vidrio inferior"
    hex: "#6A4428"
    rgb01: [0.416, 0.267, 0.157]
    rgb255: [106, 68, 40]

ramps:

  glass:
    description: "Rampa principal del vidrio, casi gris neutro."
    stops:
      - [0.031, 0.024, 0.016]  # crack_black
      - [0.180, 0.196, 0.227]  # shard_shadow
      - [0.549, 0.573, 0.604]  # shard_body
      - [0.910, 0.925, 0.937]  # shard_highlight
      - [0.984, 0.988, 0.992]  # spec_white

  wood:
    description: "Rampa cálida del fondo."
    stops:
      - [0.110, 0.059, 0.031]  # bg_wood_dark
      - [0.227, 0.125, 0.059]  # bg_wood_mid
      - [0.420, 0.243, 0.110]  # bg_wood_warm
      - [0.549, 0.329, 0.141]  # bg_wood_amber

  contrast:
    description: "Rampa global alto contraste cruzando temperatura."
    stops:
      - [0.031, 0.024, 0.016]
      - [0.227, 0.125, 0.059]
      - [0.549, 0.573, 0.604]
      - [0.984, 0.988, 0.992]

audio_mapping:
  bass:    "Escala del sunburst radial (explosión)"
  mid:     "Intensidad de los especulares"
  high:    "Cantidad de catchlights dispersos"
  onset:   "Pulso del centro focal"
  pitch:   "Rotación del sunburst"
  clarity: "Nitidez de los hairlines"
